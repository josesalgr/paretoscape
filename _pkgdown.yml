title: mosap
url: https://josesalgr.github.io/mosap/

template:
  bootstrap: 5
  params:
    docsearch:
      api_key: f00985ff93067595b4da97a65fe69f1a
      index_name: mosap
    ganalytics: G-6YB8F3838H

destination: docs

navbar:
  structure:
    left:
      - home
      - reference
      - articles
      - news
    right:
      - github
  components:
    github:
      icon: fa-github
      href: https://github.com/josesalgr/mosap
      aria-label: GitHub repository

reference:

  - title: Build and solve problems
    desc: Core workflow to create a planning problem, configure it, and solve it.
    contents:
      - inputData
      - solve

  - title: Actions, effects, profits and locks
    desc: Define feasible actions, their effects, optional profits, and fixed decisions.
    contents:
      - add_actions
      - add_effects
      - add_benefits
      - add_losses
      - add_profit
      - add_locked_actions
      - add_locked_pu

  - title: Targets and constraints
    desc: Define target requirements and area-related constraints.
    contents:
      - add_targets_absolute
      - add_targets_relative
      - add_area_min_constraint
      - add_area_max_constraint

  - title: Spatial relations
    desc: Register boundary and graph-based spatial relations from tables, polygons, or coordinates.
    contents:
      - add_spatial_relations
      - add_spatial_boundary
      - add_spatial_rook
      - add_spatial_queen
      - add_spatial_knn
      - add_spatial_distance

  - title: Atomic objectives
    desc: Register objectives that can be solved individually or combined in multi-objective workflows.
    contents:
      - add_objective_min_cost
      - add_objective_max_benefit
      - add_objective_min_loss
      - add_objective_max_profit
      - add_objective_max_net_profit
      - add_objective_min_fragmentation
      - add_objective_min_action_fragmentation
      - add_objective_min_intervention_impact

  - title: Multi-objective methods
    desc: Configure weighted-sum, epsilon-constraint, and AUGMECON workflows.
    contents:
      - set_method_weighted
      - set_method_epsilon_constraint
      - set_method_augmecon

  - title: Solver configuration
    desc: Store solver and runtime options before calling solve().
    contents:
      - set_solver
      - set_solver_gurobi
      - set_solver_cplex
      - set_solver_cbc
      - set_solver_symphony

  - title: Results and extraction
    desc: Extract user-facing summaries and raw solution vectors.
    contents:
      - get_pu
      - get_actions
      - get_features
      - get_targets
      - get_solution_vector

  - title: Plotting
    desc: Visualize spatial outputs and multi-objective trade-offs.
    contents:
      - plot_spatial
      - plot_tradeoff

  - title: Classes
    desc: Core classes used across the package.
    contents:
      - problem-class
      - solution-class
      - solutionset-class

  - title: Data
    desc: Simulated datasets distributed with the package.
    contents:
      - starts_with("sim_")
      - simData
